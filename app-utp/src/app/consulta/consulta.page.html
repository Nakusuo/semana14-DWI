<ion-header>
  <ion-toolbar color="danger">
    <ion-title>Lista de Registros</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-refresher slot="fixed" (ionRefresh)="refrescar($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <ion-list *ngIf="!cargando && registros.length > 0">
    <ion-item *ngFor="let registro of registros">
      <ion-label>
        <h2>{{ registro.nombre }}</h2>
        <p>{{ registro.correo }}</p>
        <ion-badge color="primary">{{ registro.tipoApp }}</ion-badge>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-item *ngIf="!cargando && registros.length === 0">
    <ion-label>No hay registros disponibles</ion-label>
  </ion-item>

  <ion-item *ngIf="error">
    <ion-label color="danger">{{ error }}</ion-label>
  </ion-item>

  <ion-button expand="block" color="medium" routerLink="/home">
    Volver al Inicio
  </ion-button>
</ion-content>
